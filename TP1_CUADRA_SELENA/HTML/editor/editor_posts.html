<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/CSS/style-editor.css">
    <title>Editor - Gestión de Posts</title>
  
</head>
<body>

    <div class="sidebar d-flex flex-column p-3">
        <h3 class="text-success fw-bold text-center mb-4">Mundial 360</h3>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="editor_dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            </li>
            <li>
                <a href="editor_posts.html" class="nav-link active"><i class="bi bi-file-earmark-text me-2"></i> Mis Posts</a>
            </li>
            <li>
                <a href="editor_categorias.html" class="nav-link"><i class="bi bi-tags me-2"></i> Categorías</a>
            </li>
            <li>
                <a href="editor_comentarios.html" class="nav-link"><i class="bi bi-chat-dots me-2"></i> Moderación</a>
            </li>
        </ul>
        <hr>
        <div class="dropdown">
            <a href="index.html" class="text-white text-decoration-none"><strong>← Volver al Blog</strong></a>
        </div>
    </div>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gestión de Publicaciones</h2>
            <button class="btn btn-success"><i class="bi bi-plus-lg"></i> Crear Nueva Noticia</button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Imagen</th>
                            <th>Título</th>
                            <th>Categoría</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#001</td>
                            <td><img src="https://via.placeholder.com/50" class="rounded"></td>
                            <td>¿Llega el Cuti al debut?</td>
                            <td>Fútbol</td>
                            <td><span class="badge bg-success">Publicado</span></td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>#002</td>
                            <td><img src="https://via.placeholder.com/50" class="rounded"></td>
                            <td>Sabalenka en la final</td>
                            <td>Tenis</td>
                            <td><span class="badge bg-warning text-dark">Borrador</span></td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

</body>
</html>
