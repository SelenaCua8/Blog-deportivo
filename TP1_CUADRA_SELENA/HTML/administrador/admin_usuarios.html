<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/CSS/style-admin.css">
    <title>Admin - CRUD Usuarios | Mundial 360</title>
</head>
<body>

    <div class="sidebar shadow">
        <div class="text-center mb-4">
            <h4 class="fw-bold">Mundial <span class="text-dark">360</span></h4>
            <span class="badge bg-dark">PANEL ADMIN</span>
        </div>
        <hr>
        <nav class="nav flex-column">
            <a class="nav-link" href="admin_dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="nav-link active" href="admin_usuarios.html"><i class="bi bi-people"></i> Usuarios</a>
            <a class="nav-link" href="admin_editores.html"><i class="bi bi-person-badge"></i> Editores</a>
            <a class="nav-link" href="admin_posts.html"><i class="bi bi-file-earmark-text"></i> Publicaciones</a>
            <a class="nav-link" href="admin_reportes.html"><i class="bi bi-bar-chart"></i> Reportes</a>
            <a class="nav-link" href="admin_configuracion.html"><i class="bi bi-gear"></i> Configuración</a>
            <div class="mt-5 p-3">
                <a href="/HTML/index/index-administrador.html" class="btn btn-dark w-100 btn-sm"><i class="bi bi-house-door"></i> Volver al Blog</a>
            </div>
        </nav>
    </div>

    <nav class="navbar navbar-custom px-4 py-3 shadow-sm">
        <div class="container-fluid">
            <span class="navbar-text fw-bold text-dark fs-5">Gestión de Usuarios</span>
            <div class="d-flex">
                <button class="btn btn-success btn-sm fw-bold me-3" data-bs-toggle="modal" data-bs-target="#modalUsuario">
                    <i class="bi bi-person-plus-fill me-1"></i> Nuevo Usuario
                </button>
                <a href="../login.html" class="btn btn-danger btn-sm fw-bold">Salir</a>
            </div>
        </div>
    </nav>

    <main class="content">
        <div class="container-fluid py-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white fw-bold py-3 d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-table me-2 text-danger"></i> Listado de Usuarios</span>
                    <input type="text" class="form-control form-control-sm w-25" placeholder="Filtrar...">
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 text-center">
                        <thead class="table-light text-uppercase small fw-bold">
                            <tr>
                                <th>Usuario</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="fw-bold">lionel.messi</td>
                                <td>leo@davinci.edu.ar</td>
                                <td><span class="badge bg-success">Espectador</span></td>
                                <td><span class="text-success small fw-bold">Activo</span></td>
                                <td>
                                    <button class="btn btn-sm btn-outline-dark me-1" data-bs-toggle="modal" data-bs-target="#modalUsuario" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" data-bs-target="#modalBorrar" title="Eliminar">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalUsuario" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Datos del Usuario</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formUsuario">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre de Usuario</label>
                            <input type="text" class="form-control" placeholder="Ej: cuti.romero">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" placeholder="nombre@ejemplo.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Asignar Rol</label>
                            <select class="form-select">
                                <option value="1">Espectador</option>
                                <option value="2">Editor</option>
                                <option value="3">Administrador</option>
                            </select>
                        </div>
                        <div class="mb-3 text-center">
                             <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="estado" id="activo" checked>
                                <label class="form-check-label" for="activo">Activo</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="estado" id="baneado">
                                <label class="form-check-label" for="baneado">Baneado</label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

  

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
