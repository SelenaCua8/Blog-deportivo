<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <title>Admin - Configuración | Mundial 360</title>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-danger shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="admin_dashboard.html">Mundial 360 <span class="badge bg-dark ms-2">CONFIG</span></a>
            <a href="admin_dashboard.html" class="btn btn-outline-light btn-sm">Volver al Panel</a>
        </div>
    </nav>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white p-3">
                        <h5 class="mb-0"><i class="bi bi-gear-fill me-2"></i> Ajustes Generales del Blog</h5>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre del Sitio</label>
                                <input type="text" class="form-control" value="Mundial 360">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Eslogan / Descripción</label>
                                <input type="text" class="form-control" value="Tu fuente oficial de noticias deportivas.">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email de Contacto Técnico</label>
                                <input type="email" class="form-control" value="admin@mundial360.com">
                            </div>
                            <hr>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Logo del Blog (URL)</label>
                                <input type="text" class="form-control" placeholder="https://link-al-logo.png">
                            </div>
                            <div class="form-check form-switch mb-4">
                                <input class="form-check-input" type="checkbox" id="mantenimiento">
                                <label class="form-check-label" for="mantenimiento">Activar Modo Mantenimiento</label>
                            </div>
                            <button type="submit" class="btn btn-danger w-100 fw-bold">GUARDAR CAMBIOS</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
