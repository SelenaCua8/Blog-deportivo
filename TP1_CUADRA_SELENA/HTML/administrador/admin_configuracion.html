<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/CSS/style-admin.css">
    <title>Admin - Configuración | Mundial 360</title>
  
</head>
<body>

    <div class="sidebar shadow">
        <div class="text-center mb-4">
            <h4 class="fw-bold">Mundial <span class="text-dark">360</span></h4>
            <span class="badge bg-dark">PANEL ADMIN</span>
        </div>
        <hr>
        <nav class="nav flex-column">
            <a class="nav-link" href="admin_dashboard.html">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a class="nav-link" href="admin_usuarios.html">
                <i class="bi bi-people"></i> Usuarios
            </a>
            <a class="nav-link" href="admin_editores.html">
                <i class="bi bi-person-badge"></i> Editores
            </a>
            <a class="nav-link" href="admin_posts.html">
                <i class="bi bi-file-earmark-text"></i> Publicaciones
            </a>
            <a class="nav-link" href="admin_reportes.html">
                <i class="bi bi-bar-chart"></i> Reportes
            </a>
            <a class="nav-link active" href="admin_configuracion.html">
                <i class="bi bi-gear"></i> Configuración
            </a>
            <div class="mt-5 p-3">
                  <a href="/HTML/index/index-administrador.html" class="btn btn-dark w-100 btn-sm">
                    <i class="bi bi-house-door"></i> Volver al Blog
                </a>
            </div>
        </nav>
    </div>

    <nav class="navbar navbar-custom px-4 py-3">
        <div class="container-fluid">
            <span class="navbar-text fw-bold text-dark">
                Configuración General del Sistema
            </span>
            <div class="d-flex text-muted small">
                Último acceso: Hoy 22:15
            </div>
        </div>
    </nav>

    <main class="content">
        <div class="container-fluid">
            <div class="row justify-content-center mt-4">
                <div class="col-md-10">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-dark text-white p-3">
                            <h5 class="mb-0 fw-bold"><i class="bi bi-sliders me-2 text-danger"></i> Ajustes del Blog</h5>
                        </div>
                        <div class="card-body p-4">
                            <form>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Nombre del Sitio</label>
                                        <input type="text" class="form-control" value="Mundial 360">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Email Técnico</label>
                                        <input type="email" class="form-control" value="admin@mundial360.com">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Eslogan / Descripción</label>
                                    <input type="text" class="form-control" value="Tu fuente oficial de noticias deportivas.">
                                </div>
                                <hr class="my-4">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Logo del Blog (URL)</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
                                        <input type="text" class="form-control" placeholder="https://link-al-logo.png">
                                    </div>
                                </div>
                                <div class="p-3 bg-light rounded mb-4 border">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="mantenimiento">
                                        <label class="form-check-label fw-bold" for="mantenimiento">Activar Modo Mantenimiento</label>
                                        <div class="form-text text-danger">Aviso: Solo los administradores podrán acceder al sitio si esta opción está activa.</div>
                                    </div>
                                </div>
                                <div class="text-end">
                                    <button type="submit" class="btn btn-danger px-5 fw-bold">GUARDAR CAMBIOS</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

  
</body>
</html>
