<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/CSS/index.css">
    <title>Registración</title>
</head>
<body>
  <div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 login-card p-4"> <h2 class="text-center fw-bold mb-4" style="color: #28a745;">Registro de <span class="text-dark">Prensa</span></h2>

            <form class="needs-validation" novalidate>
                <div class="row"> <div class="col-md-6 mb-3">
                        <label for="validationCustom01" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="validationCustom01" placeholder="Ej: Lionel" required>
                        <div class="valid-feedback">¡Excelente!</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="validationCustom02" class="form-label">Apellido</label>
                        <input type="text" class="form-control" id="validationCustom02" placeholder="Ej: Messi" required>
                        <div class="valid-feedback">Perfecto.</div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="inputPassword6" class="form-label">Password</label>
                        <input type="password" id="inputPassword6" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="validationCustom04" class="form-label">Rol en el Blog</label>
                        <select class="form-select" id="validationCustom04" required>
                            <option selected disabled value="">Elegí un rol...</option>
                            <option value="1">Administrador</option>
                            <option value="2">Editor (Redactor)</option>
                            <option value="3">Lector (Fanático)</option>
                        </select>
                        <div class="invalid-feedback">Por favor elegí un rol válido.</div>
                    </div>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="invalidCheck" required>
                    <label class="form-check-label" for="invalidCheck">
                        Acepto los términos de Mundial 360.
                    </label>
                </div>

                <button class="btn btn-futbol w-100" type="submit">Finalizar Registro</button>
            </form>
        </div>
    </div>
</div>

<script>
// Example starter JavaScript for disabling form submissions if there are invalid fields
(function() {
  'use strict';
  window.addEventListener('load', function() {
    // Fetch all the forms we want to apply custom Bootstrap validation styles to
    var forms = document.getElementsByClassName('needs-validation');
    // Loop over them and prevent submission
    var validation = Array.prototype.filter.call(forms, function(form) {
      form.addEventListener('submit', function(event) {
        if (form.checkValidity() === false) {
          event.preventDefault();
          event.stopPropagation();
        }
        form.classList.add('was-validated');
      }, false);
    });
  }, false);
})();
</script>
</body>
</html>
