<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blog Deportivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/CSS/index.css">
</head>
<body>

    <div class="container mt-5">
        
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold" style="color: #28a745;">Mundial 360 <span class="text-dark">BLOG</span></h2>
                    <p class="text-muted small">Tu acceso al campo de juego</p>
                </div>

                <div class="login-card p-4">
                    <form>
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com">
                        </div>
                        
                        <div class="mb-3">
                            <label for="pass" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="pass" placeholder="••••••••">
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="check">
                            <label class="form-check-label small" for="check">Recordar mi sesión</label>
                        </div>
                        
                        <button type="submit" class="btn btn-futbol w-100 py-2">Ingresar al Vestuario</button>
                    </form>
                </div>
                
                <div class="text-center mt-4">
                    <a href="#" class="text-decoration-none small text-muted">¿Olvidaste tu contraseña?</a>
                </div>

            </div>
        </div>
    </div>

    
</body>
</html>
